import org.owasp.dependencycheck.reporting.ReportGenerator

plugins {
    id 'io.spring.dependency-management' version '1.1.6'
    id 'java'
    id 'java-library'
    id 'nu.studer.jooq' version '7.2' // get rid of plugin after Java 21 and Jooq v3.19+ upgrades
    id 'org.owasp.dependencycheck' version '8.4.3'
}

apply from: 'project-properties.gradle'
apply from: "$scriptsUrl/release-commons.gradle"
apply from: "$scriptsUrl/signing.gradle"
apply from: "$scriptsUrl/copy-database-scripts.gradle"
//apply from: "$scriptsUrl/build-quality.gradle"
apply from: "$scriptsUrl/jacoco.gradle"

repositories {
    mavenCentral { url "https://repo1.maven.org/maven2" }
    maven {
        url = uri("https://plugins.gradle.org/m2/")
    }
    if (!releaseMode) {
        maven { url 'https://jitpack.io' }
    }
}

dependencyManagement {
    imports {
        mavenBom(releaseMode ? 'com.epam.reportportal:commons-bom:5.11.7' : 'com.epam.reportportal:commons-bom:5.11.7')
        mavenBom('io.zonky.test.postgres:embedded-postgres-binaries-bom:16.2.0')
    }
}

dependencies {
    if (releaseMode) {
        implementation 'com.epam.reportportal:commons'
    } else {
        implementation 'com.github.reportportal:commons:67cbfaea24'
    }
    // jooq dependencies
    jooqGenerator 'jakarta.xml.bind:jakarta.xml.bind-api:3.0.1' // required for nu.studer.jooq
    jooqGenerator "org.postgresql:postgresql:${jdbcDriverVersion}"
    implementation "org.postgresql:postgresql:${jdbcDriverVersion}"
    implementation "org.jooq:jooq:${jooqVersion}"
    implementation "org.jooq:jooq-meta:${jooqVersion}"
    implementation "org.jooq:jooq-codegen:${jooqVersion}"

    implementation 'org.springframework.security:spring-security-core'
    implementation 'org.springframework:spring-webmvc'
    implementation 'org.apache.tika:tika-core'

    //https://nvd.nist.gov/vuln/detail/CVE-2020-10683 (dom4j 2.1.3 version dependency) AND https://nvd.nist.gov/vuln/detail/CVE-2019-14900
    implementation('org.springframework.boot:spring-boot-starter-data-jpa') {
        exclude group: 'org.hibernate', module: 'hibernate-core'
    }
    implementation 'org.springframework:spring-jdbc:5.3.33'
    implementation 'org.hibernate:hibernate-core:5.6.15.Final'
    //

    implementation 'io.minio:minio:6.0.13'

    implementation group: 'org.json', name: 'json', version: '20231013'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
    implementation 'org.hibernate.validator:hibernate-validator'

    implementation 'org.apache.commons:commons-collections4:4.4'
    implementation 'commons-fileupload:commons-fileupload:1.4'
    implementation('commons-validator:commons-validator:1.6') {
        exclude group: 'commons-beanutils', module: 'commons-beanutils'
    }

    implementation 'org.jasypt:jasypt:1.9.3'

    implementation 'io.zonky.test:embedded-postgres:2.0.6'
    //Fix CVE-2024-25710, CVE-2024-26308
    implementation 'org.apache.commons:commons-compress:1.26.0'
    implementation 'org.flywaydb:flyway-core:6.3.1'

    implementation 'org.apache.jclouds.api:s3:2.5.0'
    implementation 'org.apache.jclouds.provider:aws-s3:2.5.0'
    implementation 'org.apache.jclouds.api:filesystem:2.5.0'

    // add lombok support
    compileOnly "org.projectlombok:lombok:${lombokVersion}"
    annotationProcessor "org.projectlombok:lombok:${lombokVersion}"
    testCompileOnly "org.projectlombok:lombok:${lombokVersion}"
    testAnnotationProcessor "org.projectlombok:lombok:${lombokVersion}"
    implementation 'org.springframework.boot:spring-boot-starter-cache'
    implementation 'com.github.ben-manes.caffeine:caffeine'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.flywaydb.flyway-test-extensions:flyway-spring-test:6.1.0'

}


jooq {
    version = '3.16.23'
    edition.set(nu.studer.gradle.jooq.JooqEdition.OSS)
    configurations {
        main {
            generationTool {
                jdbc {
                    driver = 'org.postgresql.Driver'
                    url = 'jdbc:postgresql://localhost:5432/reportportal'
                    user = 'rpuser'
                    password = 'rppass'
                }
                generator {
                    strategy {
                        name = 'org.jooq.codegen.example.JPrefixGeneratorStrategy'
                        // ...
                    }
                    database {
                        name = 'org.jooq.meta.postgres.PostgresDatabase'
                        inputSchema = (hasDBSchema ? getProperty('DB_SCHEMA_POSTGRES') : 'public')
                        // ...
                        excludes = 'batch_.*|schema_migrations'
                    }
                    generate {
                        pojos = false
                        jpaAnnotations = false
                        routines = false
                        deprecationOnUnknownTypes = false
                        records = true
                    }
                    target {
                        packageName = 'com.epam.ta.reportportal.jooq'
                        directory = 'src/main/java'
                    }
                }
            }
        }

    }
}

dependencyCheck {
    formats = [ReportGenerator.Format.HTML, ReportGenerator.Format.XML]
}

test {
    useJUnitPlatform()
    testLogging {
        events = ["failed"]
        exceptionFormat = "short"
    }
}

tasks.withType(JavaCompile) {
    options.encoding = "UTF-8"
    options.compilerArgs << "-parameters"
    options.debug = true
    options.debugOptions.debugLevel = "source,lines,vars"
}

checkCommitNeeded.dependsOn removeScripts
test.dependsOn copyTestDatabaseScripts
build.dependsOn jacocoTestReport
